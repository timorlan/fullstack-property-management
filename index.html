    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // --- החיבור לפיירבייס ---
        const firebaseConfig = {
            apiKey: "AIzaSyB8lyZhWRLKLBFtrfc5ZeKIAdxqHL71Yhg",
            authDomain: "lankri-group-management.firebaseapp.com",
            databaseURL: "https://lankri-group-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lankri-group-management",
            appId: "1:909434156904:web:9262a99f3a61754ae748dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Data structure
        let data = {
            clients: []
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('מערכת לנקרי - אתחול...');
            loadData();
        });

        // Load data from Firebase (החליף את הזיכרון המקומי)
        function loadData() {
            try {
                // יצרתי לך טבלה חדשה בגלל העיצוב החדש כדי שהכל יעבוד חלק
                db.ref('lankri_v7_new_design').on('value', (snapshot) => {
                    const val = snapshot.val();
                    if (val) {
                        data = val;
                        if (!data.clients) data.clients = [];
                    } else {
                        data = { clients: [] };
                    }
                    displayClients();
                    if (document.getElementById('reports').classList.contains('active')) {
                        generateReports();
                    }
                    console.log('נתונים נטענו מפיירבייס בהצלחה');
                });
            } catch (error) {
                console.error('שגיאה בטעינת נתונים:', error);
                data = { clients: [] };
            }
        }

        // Save data to Firebase (החליף את הזיכרון המקומי)
        function saveData() {
            try {
                db.ref('lankri_v7_new_design').set(data);
                // הפונקציות המקוריות שלך - לא נגענו!
                displayClients();
                if (document.getElementById('reports').classList.contains('active')) {
                    generateReports();
                }
                console.log('נתונים נשמרו בפיירבייס בהצלחה');
            } catch (error) {
                console.error('שגיאה בשמירת נתונים:', error);
                alert('שגיאה בשמירת הנתונים');
            }
        }
