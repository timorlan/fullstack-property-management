<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANKRI GROUP - מערכת ניהול נכסים</title>
    <meta name="theme-color" content="#2c5aa0">
    <link rel="manifest" id="manifest-placeholder">
    
    <style>
        /* שילוב העיצוב החדש והנקי על המבנה הקיים */
        :root {
            --lankri-blue: #2c5aa0;
            --lankri-light: #4a7bc8;
            --bg-gradient: linear-gradient(135deg, #1e3a5f 0%, #2c5aa0 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            margin: 0; padding: 15px; min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 92vh;
        }

        .header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--lankri-blue);
        }

        .nav-tabs {
            display: flex;
            background: #f1f3f5;
            border-bottom: 1px solid #dee2e6;
        }

        .nav-tab {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: bold;
            color: #555;
            transition: 0.3s;
        }

        .nav-tab.active {
            color: var(--lankri-blue);
            background: white;
            border-bottom: 3px solid var(--lankri-blue);
        }

        /* מבנה הרשימה והפרטים מהקוד המקורי */
        .clients-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        .clients-list {
            border-left: 1px solid #eee;
            background: #f8f9fa;
            overflow-y: auto;
            padding: 10px;
        }

        .client-list-item {
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.2s;
        }

        .client-list-item.active {
            background: var(--lankri-blue);
            color: white;
            border-color: var(--lankri-blue);
        }

        .client-detail {
            padding: 20px;
            overflow-y: auto;
            background: white;
        }

        /* סגנונות כפתורים ומודלים */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary { background: var(--lankri-blue); color: white; }
        
        .property-card {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center; justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 style="margin: 0; color: var(--lankri-blue);">LANKRI GROUP</h2>
            <div id="connectionStatus" style="font-size: 0.8em; color: green;">● מחובר ל-Database</div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('clients')">👥 לקוחות ונכסים</button>
            <button class="nav-tab" onclick="switchTab('reports')">📊 דוחות והכנסות</button>
        </div>

        <div id="clients" class="tab-content active" style="height: 100%; display: flex; flex-direction: column;">
            <div class="clients-layout">
                <div class="clients-list">
                    <button class="btn btn-primary" style="width: 100%; margin-bottom: 15px;" onclick="openClientModal()">+ לקוח חדש</button>
                    <div id="clientsListContainer">
                        </div>
                </div>
                <div id="clientDetailContainer" class="client-detail">
                    <div style="text-align: center; margin-top: 50px; color: #888;">
                        בחר לקוח מהרשימה לצפייה בנכסים, שוכרים ותקלות
                    </div>
                </div>
            </div>
        </div>

        <div id="reports" class="tab-content" style="display: none; padding: 25px;">
            <div id="reportsContent">
                </div>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content">
            <h3>פרטי לקוח</h3>
            <form onsubmit="saveClient(event)">
                <input type="hidden" id="clientId">
                <div style="margin-bottom:10px;">
                    <label>שם לקוח:</label>
                    <input type="text" id="clientName" required style="width:100%; padding:8px;">
                </div>
                <div style="margin-bottom:10px;">
                    <label>דמי ניהול (%):</label>
                    <input type="number" id="clientFee" step="0.1" required style="width:100%; padding:8px;">
                </div>
                <button type="submit" class="btn btn-primary">שמור</button>
                <button type="button" class="btn" onclick="closeModal('clientModal')">ביטול</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // הגדרות FIREBASE (העתק מדויק מהקובץ שלך)
        const firebaseConfig = {
            apiKey: "AIzaSyB8lyZhWRLKLBFtrfc5ZeKIAdxqHL71Yhg",
            authDomain: "lankri-group-management.firebaseapp.com",
            databaseURL: "https://lankri-group-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lankri-group-management",
            appId: "1:909434156904:web:9262a99f3a61754ae748dd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'lankri_v8_new_design';

        let appData = { clients: [] };
        let currentClientId = null;

        // האזנה לשינויים ב-Database
        db.ref(DB_PATH).on('value', (snapshot) => {
            const val = snapshot.val();
            appData = val || { clients: [] };
            renderClientsList();
            if (currentClientId) renderClientDetails();
            renderReports();
        });

        // פונקציות הליבה (פונקציות ה-Logic שנלקחו מהמקור)
        
        function renderClientsList() {
            const container = document.getElementById('clientsListContainer');
            container.innerHTML = appData.clients.map(client => `
                <div class="client-list-item ${currentClientId === client.id ? 'active' : ''}" onclick="selectClient('${client.id}')">
                    <strong>${client.name}</strong><br>
                    <small>דמי ניהול: ${client.managementFee || client.fee}%</small>
                </div>
            `).join('');
        }

        function selectClient(id) {
            currentClientId = id;
            renderClientsList();
            renderClientDetails();
        }

        function renderClientDetails() {
            const client = appData.clients.find(c => c.id === currentClientId);
            if (!client) return;

            const container = document.getElementById('clientDetailContainer');
            // כאן מוזרק כל המבנה של הנכסים והתקלות בדיוק כמו במקור
            container.innerHTML = `
                <div class="client-header">
                    <h3>${client.name}</h3>
                    <button class="btn btn-primary btn-small" onclick="openPropertyModal()">+ הוסף נכס</button>
                </div>
                <div class="properties-list">
                    ${(client.properties || []).map((prop, idx) => `
                        <div class="property-card">
                            <h4>${prop.address} - <span style="color:blue">${prop.status}</span></h4>
                            ${prop.tenant ? `
                                <div style="background:#eef; padding:10px; border-radius:5px;">
                                    <strong>שוכר: ${prop.tenant.name}</strong> | שכירות: ₪${prop.tenant.rent}
                                </div>
                            ` : '<p>אין שוכר פעיל</p>'}
                            <div style="margin-top:10px;">
                                <button class="btn btn-small" onclick="addRepair('${idx}')">🔧 דווח תקלה</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // פונקציות ניווט
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            event.target.classList.add('active');
        }

        // עזרי מודלים
        function openClientModal() { document.getElementById('clientModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function saveClient(e) {
            e.preventDefault();
            const newClient = {
                id: Date.now().toString(),
                name: document.getElementById('clientName').value,
                fee: document.getElementById('clientFee').value,
                properties: []
            };
            appData.clients.push(newClient);
            db.ref(DB_PATH).set(appData).then(() => closeModal('clientModal'));
        }

        // דוחות (העתק מדויק של פונקציית החישוב מהמקור)
        function renderReports() {
            const reportsDiv = document.getElementById('reportsContent');
            let totalIncome = 0;
            appData.clients.forEach(c => {
                (c.properties || []).forEach(p => {
                    if (p.status === 'מושכר' && p.tenant) {
                        totalIncome += (parseFloat(p.tenant.rent) * (parseFloat(c.managementFee || c.fee) / 100));
                    }
                });
            });
            reportsDiv.innerHTML = `<h3>סיכום דמי ניהול חודשיים: ₪${totalIncome.toLocaleString()}</h3>`;
        }

    </script>
</body>
</html>
