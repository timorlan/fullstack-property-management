<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קבוצת לנקרי - ניהול נכסים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-tab:hover {
            background: #e9ecef;
            color: #495057;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clients-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            height: calc(100vh - 300px);
        }

        .clients-list {
            border: 2px solid #dee2e6;
            border-radius: 12px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .client-list-item {
            padding: 15px;
            border-bottom: 2px solid #dee2e6;
            cursor: pointer;
            transition: all 0.3s;
        }

        .client-list-item:hover {
            background: #e9ecef;
        }

        .client-list-item.active {
            background: white;
            border-right: 4px solid #667eea;
        }

        .client-list-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #495057;
            margin-bottom: 5px;
        }

        .client-list-info {
            font-size: 0.85em;
            color: #6c757d;
        }

        .client-detail {
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 30px;
            overflow-y: auto;
            background: white;
        }

        .client-card {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .client-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .alert-banner {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-banner.danger {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .alert-banner .alert-icon {
            font-size: 1.5em;
        }

        .alert-banner .alert-text {
            flex: 1;
        }

        .popup-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 3px solid #dc3545;
            border-radius: 12px;
            padding: 20px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 2000;
            min-width: 400px;
            animation: slideDown 0.5s;
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .popup-alert-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #dc3545;
            font-weight: bold;
            font-size: 1.2em;
        }

        .popup-alert-body {
            color: #495057;
        }

        .popup-alert-close {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
        }

        .client-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .client-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            font-size: 0.9em;
        }

        .info-label {
            font-weight: 600;
            color: #6c757d;
        }

        .properties-list {
            margin-top: 15px;
        }

        .property-item {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .property-title {
            font-weight: bold;
            color: #495057;
            font-size: 1.1em;
        }

        .property-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 0.85em;
        }

        .tenant-info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .tenant-name {
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 5px;
        }

        .repairs-list {
            background: #fff3cd;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .repair-item {
            padding: 5px 0;
            border-bottom: 1px solid #ffc107;
        }

        .repair-item:last-child {
            border-bottom: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-left: 10px;
        }

        .btn-small {
            padding: 5px 15px;
            font-size: 0.9em;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #6c757d;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-rented {
            background: #d4edda;
            color: #155724;
        }

        .status-vacant {
            background: #fff3cd;
            color: #856404;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #495057;
            margin: 20px 0 10px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #dee2e6;
        }

        .add-property-btn {
            display: inline-block;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .client-info,
            .property-details {
                grid-template-columns: 1fr;
            }

            .clients-layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .clients-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 קבוצת לנקרי - ניהול נכסים</h1>
            <p>מערכת מקצועית לניהול לקוחות ונכסים</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('clients')">👥 לקוחות</button>
            <button class="nav-tab" onclick="switchTab('reports')">📊 דוחות</button>
        </div>

        <div id="clients" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>ניהול לקוחות ונכסים</h2>
                <button class="btn btn-primary" onclick="openClientModal()">+ הוסף לקוח חדש</button>
            </div>
            
            <div id="alertsContainer"></div>
            
            <div class="clients-layout">
                <div class="clients-list" id="clientsList"></div>
                <div class="client-detail" id="clientDetail">
                    <div class="empty-state">
                        <h3>בחר לקוח מהרשימה</h3>
                        <p>לחץ על לקוח כדי לראות את הפרטים המלאים</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="reports" class="tab-content">
            <h2 style="margin-bottom: 20px;">דוחות ותובנות</h2>
            <div id="reportsContent"></div>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="clientModalTitle">הוסף לקוח חדש</h2>
                <button class="close-btn" onclick="closeModal('clientModal')">&times;</button>
            </div>
            <form id="clientForm" onsubmit="saveClient(event)">
                <input type="hidden" id="clientEditId">
                
                <div class="section-title">פרטי הלקוח</div>
                
                <div class="form-group">
                    <label>שם הלקוח*</label>
                    <input type="text" id="clientName" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>טלפון*</label>
                        <input type="tel" id="clientPhone" required>
                    </div>
                    <div class="form-group">
                        <label>אימייל</label>
                        <input type="email" id="clientEmail">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>ת.ז / ח.פ*</label>
                        <input type="text" id="clientIdNumber" required>
                    </div>
                    <div class="form-group">
                        <label>דמי ניהול (%)*</label>
                        <select id="clientManagementFee" required>
                            <option value="">בחר אחוז</option>
                            <option value="8">8%</option>
                            <option value="8.333">8.333%</option>
                            <option value="8.5">8.5%</option>
                            <option value="9">9%</option>
                            <option value="10">10%</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>כתובת</label>
                    <input type="text" id="clientAddress">
                </div>
                
                <div class="form-group">
                    <label>הערות</label>
                    <textarea id="clientNotes"></textarea>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">שמור לקוח</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('clientModal')">ביטול</button>
                </div>
            </form>
        </div>
    </div>

    <div id="propertyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="propertyModalTitle">הוסף נכס</h2>
                <button class="close-btn" onclick="closeModal('propertyModal')">&times;</button>
            </div>
            <form id="propertyForm" onsubmit="saveProperty(event)">
                <input type="hidden" id="propertyEditId">
                <input type="hidden" id="propertyClientId">
                
                <div class="section-title">פרטי הנכס</div>
                
                <div class="form-group">
                    <label>כתובת הנכס*</label>
                    <input type="text" id="propertyAddress" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>סוג נכס*</label>
                        <select id="propertyType" required>
                            <option value="">בחר סוג</option>
                            <option value="דירה">דירה</option>
                            <option value="בית פרטי">בית פרטי</option>
                            <option value="משרד">משרד</option>
                            <option value="חנות">חנות</option>
                            <option value="מחסן">מחסן</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>גודל (מ"ר)*</label>
                        <input type="number" id="propertySize" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>מספר חדרים</label>
                        <input type="number" step="0.5" id="propertyRooms">
                    </div>
                    <div class="form-group">
                        <label>קומה</label>
                        <input type="text" id="propertyFloor">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>סטטוס*</label>
                    <select id="propertyStatus" required onchange="toggleTenantFields()">
                        <option value="פנוי">פנוי</option>
                        <option value="מושכר">מושכר</option>
                    </select>
                </div>
                
                <div id="tenantSection" style="display: none;">
                    <div class="section-title">פרטי השוכר</div>
                    
                    <div class="form-group">
                        <label>שם השוכר*</label>
                        <input type="text" id="tenantName">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>טלפון שוכר*</label>
                            <input type="tel" id="tenantPhone">
                        </div>
                        <div class="form-group">
                            <label>ת.ז שוכר*</label>
                            <input type="text" id="tenantIdNumber">
                        </div>
                    </div>
                    
                    <div class="section-title">פרטי הסכם השכירות</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>דמי שכירות (₪)*</label>
                            <input type="number" id="contractRent">
                        </div>
                        <div class="form-group">
                            <label>סכום ביטחונות (₪)</label>
                            <input type="number" id="contractSecurityAmount" placeholder="סה״כ שווי הביטחונות">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>סוגי ביטחונות (ניתן לבחור מספר אפשרויות)</label>
                        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                            <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: #f8f9fa; border: 2px solid #dee2e6; border-
