<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANKRI GROUP - מערכת ניהול נכסים</title>
    <meta name="theme-color" content="#2c5aa0">
    <link rel="manifest" id="manifest-placeholder">
    
    <style>
        :root {
            --lankri-blue: #2c5aa0;
            --lankri-light: #4a7bc8;
            --bg-gradient: linear-gradient(135deg, #1e3a5f 0%, #2c5aa0 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .header {
            padding: 15px 25px;
            background: white;
            border-bottom: 3px solid var(--lankri-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .nav-tab {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: bold;
            color: #666;
            transition: 0.3s;
        }

        .nav-tab.active {
            color: var(--lankri-blue);
            border-bottom: 3px solid var(--lankri-blue);
            background: white;
        }

        /* ניהול לקוחות ונכסים */
        .clients-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        .clients-list {
            background: #f1f3f5;
            border-left: 1px solid #dee2e6;
            overflow-y: auto;
            padding: 10px;
        }

        .client-item {
            padding: 12px;
            background: white;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }

        .client-item.active {
            background: var(--lankri-blue);
            color: white;
        }

        .details-pane {
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fff;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .badge-rented { background: #d4edda; color: #155724; }
        .badge-vacant { background: #f8d7da; color: #721c24; }

        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--lankri-blue); color: white; }

        /* מודלים */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }

        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 style="margin:0; color: var(--lankri-blue);">LANKRI GROUP</h2>
            <div id="status" style="font-size: 0.8em; color: green;">● מחובר לענן</div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('tab-clients')">👥 לקוחות ונכסים</button>
            <button class="nav-tab" onclick="switchTab('tab-reports')">📊 דוח דמי ניהול</button>
        </div>

        <div id="tab-clients" class="tab-content" style="height: 100%;">
            <div class="clients-layout">
                <div class="clients-list">
                    <button class="btn btn-primary" style="width:100%; margin-bottom:10px;" onclick="openModal('clientModal')">+ לקוח חדש</button>
                    <div id="listContainer"></div>
                </div>
                <div id="detailsContainer" class="details-pane">
                    <div style="text-align:center; color:#999; margin-top:50px;">בחר לקוח כדי לצפות בפרטים</div>
                </div>
            </div>
        </div>

        <div id="tab-reports" class="tab-content" style="display:none; padding:25px;">
            <h3>סיכום הכנסות ודמי ניהול</h3>
            <div id="reportsContainer"></div>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content">
            <h3>פרטי לקוח</h3>
            <input type="text" id="cName" placeholder="שם הלקוח">
            <input type="number" id="cFee" placeholder="דמי ניהול (%)" step="0.1">
            <button class="btn btn-primary" onclick="saveClient()">שמור</button>
            <button class="btn" onclick="closeModal('clientModal')">ביטול</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // הגדרות Firebase מהקובץ המקורי שלך
        const firebaseConfig = {
            apiKey: "AIzaSyB8lyZhWRLKLBFtrfc5ZeKIAdxqHL71Yhg",
            authDomain: "lankri-group-management.firebaseapp.com",
            databaseURL: "https://lankri-group-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lankri-group-management",
            appId: "1:909434156904:web:9262a99f3a61754ae748dd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_REF = 'lankri_v8_production'; // נתיב הנתונים שלך

        let data = { clients: [] };
        let selectedId = null;

        // סנכרון נתונים
        db.ref(DB_REF).on('value', (snap) => {
            data = snap.val() || { clients: [] };
            renderList();
            if(selectedId) renderDetails();
            renderReports();
        });

        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = data.clients.map(c => `
                <div class="client-item ${selectedId === c.id ? 'active' : ''}" onclick="selectClient('${c.id}')">
                    <strong>${c.name}</strong><br>
                    <small>דמי ניהול: ${c.managementFee}%</small>
                </div>
            `).join('');
        }

        function selectClient(id) {
            selectedId = id;
            renderList();
            renderDetails();
        }

        function renderDetails() {
            const client = data.clients.find(c => c.id === selectedId);
            const container = document.getElementById('detailsContainer');
            
            container.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <h2>${client.name}</h2>
                    <button class="btn btn-primary" onclick="addProperty()">+ הוסף נכס</button>
                </div>
                <div class="properties-grid">
                    ${(client.properties || []).map((p, i) => `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between;">
                                <strong>${p.address}</strong>
                                <span class="badge ${p.status === 'מושכר' ? 'badge-rented' : 'badge-vacant'}">${p.status}</span>
                            </div>
                            ${p.tenant ? `
                                <div style="margin-top:10px; font-size:0.9em; background:#f8f9fa; padding:8px;">
                                    👤 שוכר: ${p.tenant.name} | 💰 שכירות: ₪${p.tenant.rent}
                                </div>
                            ` : ''}
                            <div style="margin-top:10px;">
                                <button class="btn btn-small" onclick="reportIssue(${i})">🔧 דווח תקלה</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderReports() {
            const container = document.getElementById('reportsContainer');
            let totalMgmt = 0;
            
            let html = data.clients.map(c => {
                let rent = (c.properties || [])
                    .filter(p => p.status === 'מושכר')
                    .reduce((sum, p) => sum + parseFloat(p.tenant?.rent || 0), 0);
                let fee = rent * (c.managementFee / 100);
                totalMgmt += fee;
                
                return `<div>${c.name}: ₪${fee.toLocaleString()}</div>`;
            }).join('');

            container.innerHTML = html + `<hr><h4>סה"כ דמי ניהול: ₪${totalMgmt.toLocaleString()}</h4>`;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function saveClient() {
            const newC = {
                id: Date.now().toString(),
                name: document.getElementById('cName').value,
                managementFee: document.getElementById('cFee').value,
                properties: []
            };
            data.clients.push(newC);
            db.ref(DB_REF).set(data).then(() => closeModal('clientModal'));
        }
    </script>
</body>
</html>
