<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANKRI GROUP - מערכת ניהול נכסים</title>
    <style>
        /* כאן נשאר כל העיצוב החדש והיפה שלך */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .clients-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            height: calc(100vh - 300px);
        }

        .clients-list {
            border: 2px solid #dee2e6;
            border-radius: 12px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .client-list-item {
            padding: 15px;
            border-bottom: 2px solid #dee2e6;
            cursor: pointer;
        }

        .client-list-item.active {
            background: white;
            border-right: 4px solid #667eea;
        }

        .client-detail {
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 30px;
            overflow-y: auto;
            background: white;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #6c757d; color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;
        }

        @media (max-width: 768px) {
            .clients-layout { grid-template-columns: 1fr; height: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 קבוצת לנקרי - ניהול נכסים</h1>
            <p>מערכת מקצועית לניהול לקוחות ונכסים</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('clients')">👥 לקוחות</button>
            <button class="nav-tab" onclick="switchTab('reports')">📊 דוחות</button>
        </div>

        <div id="clients" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>ניהול לקוחות ונכסים</h2>
                <button class="btn btn-primary" onclick="openClientModal()">+ הוסף לקוח חדש</button>
            </div>
            
            <div class="clients-layout">
                <div class="clients-list" id="clientsList"></div>
                <div class="client-detail" id="clientDetail">
                    <div style="text-align: center; padding: 50px; color: #6c757d;">
                        <h3>בחר לקוח מהרשימה</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="reports" class="tab-content">
            <h2 style="margin-bottom: 20px;">דוחות ותובנות</h2>
            <div id="reportsContent"></div>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content">
            <h2 id="clientModalTitle">הוסף לקוח</h2>
            <form id="clientForm" onsubmit="saveClient(event)">
                <input type="hidden" id="clientEditId">
                <div class="form-group"><label>שם הלקוח*</label><input type="text" id="clientName" required></div>
                <div class="form-group"><label>טלפון*</label><input type="tel" id="clientPhone" required></div>
                <div class="form-group"><label>אימייל</label><input type="email" id="clientEmail"></div>
                <div class="form-group"><label>ת.ז / ח.פ*</label><input type="text" id="clientIdNumber" required></div>
                <div class="form-group">
                    <label>דמי ניהול (%)*</label>
                    <select id="clientManagementFee" required>
                        <option value="8">8%</option>
                        <option value="8.333">8.333%</option>
                        <option value="10">10%</option>
                    </select>
                </div>
                <div class="form-group"><label>הערות</label><textarea id="clientNotes"></textarea></div>
                <button type="submit" class="btn btn-primary">שמור</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal('clientModal')">ביטול</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // הגדרות פיירבייס - הועתקו מהגרסה הקודמת שלך לסנכרון מלא
        const firebaseConfig = {
            apiKey: "AIzaSyB8lyZhWRLKLBFtrfc5ZeKIAdxqHL71Yhg",
            authDomain: "lankri-group-management.firebaseapp.com",
            databaseURL: "https://lankri-group-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lankri-group-management",
            appId: "1:909434156904:web:9262a99f3a61754ae748dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let data = { clients: [] };
        let activeClientId = null;

        // טעינת נתונים אוטומטית
        document.addEventListener('DOMContentLoaded', () => {
            db.ref('lankri_v8_new_design').on('value', (snapshot) => {
                const val = snapshot.val();
                data = val || { clients: [] };
                if (!data.clients) data.clients = [];
                displayClients();
            });
        });

        function displayClients() {
            const list = document.getElementById('clientsList');
            list.innerHTML = data.clients.map(client => `
                <div class="client-list-item ${activeClientId === client.id ? 'active' : ''}" onclick="selectClient('${client.id}')">
                    <div style="font-weight: bold;">${client.name}</div>
                    <div style="font-size: 0.8em; color: #666;">${client.phone}</div>
                </div>
            `).join('');
        }

        function selectClient(id) {
            activeClientId = id;
            displayClients();
            const client = data.clients.find(c => c.id === id);
            const detail = document.getElementById('clientDetail');
            
            detail.innerHTML = `
                <div style="display:flex; justify-content: space-between;">
                    <h2>${client.name}</h2>
                    <button class="btn btn-secondary" onclick="openClientModal('${client.id}')">ערוך פרטים</button>
                </div>
                <hr style="margin: 20px 0;">
                <p><strong>טלפון:</strong> ${client.phone}</p>
                <p><strong>ת.ז/ח.פ:</strong> ${client.idNumber}</p>
                <p><strong>דמי ניהול:</strong> ${client.managementFee}%</p>
                `;
        }

        function saveClient(e) {
            e.preventDefault();
            const id = document.getElementById('clientEditId').value || Date.now().toString();
            const clientData = {
                id: id,
                name: document.getElementById('clientName').value,
                phone: document.getElementById('clientPhone').value,
                email: document.getElementById('clientEmail').value,
                idNumber: document.getElementById('clientIdNumber').value,
                managementFee: parseFloat(document.getElementById('clientManagementFee').value),
                notes: document.getElementById('clientNotes').value,
                properties: []
            };

            const index = data.clients.findIndex(c => c.id === id);
            if (index > -1) {
                clientData.properties = data.clients[index].properties || [];
                data.clients[index] = clientData;
            } else {
                data.clients.push(clientData);
            }

            db.ref('lankri_v8_new_design').set(data)
                .then(() => closeModal('clientModal'));
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function openClientModal(id = null) {
            const modal = document.getElementById('clientModal');
            document.getElementById('clientForm').reset();
            if(id) {
                const client = data.clients.find(c => c.id === id);
                document.getElementById('clientEditId').value = client.id;
                document.getElementById('clientName').value = client.name;
                document.getElementById('clientPhone').value = client.phone;
                document.getElementById('clientIdNumber').value = client.idNumber;
            }
            modal.classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
    </script>
</body>
</html>
